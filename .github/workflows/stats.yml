name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # This allows you to run it manually

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download stats card
        run: |
          curl -o assets/stats.svg "https://vercel.app"

      - name: Download top languages card
        run: |
          curl -o assets/top-langs.svg "https://vercel.app"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add assets/
          git commit -m "chore: update stats cards" || echo "No changes"
          git push
