name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to manually trigger the update

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can pull/push correctly

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download stats card
        run: |
          # Added &cache_seconds=1800 to bypass the 24-hour cache
          curl -o assets/stats.svg "https://vercel.app"

      - name: Download top languages card
        run: |
          curl -o assets/top-langs.svg "https://vercel.app"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add assets/
          # Commit only if there are changes
          git commit -m "chore: update stats cards" || echo "No changes to commit"
          # Pull latest changes to avoid the [rejected] error
          git pull origin main --rebase
          git push origin HEAD:main
