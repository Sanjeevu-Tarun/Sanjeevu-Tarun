name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download stats card
        run: |
          # The cache_seconds=1800 forces the API to refresh your streak immediately
          curl -o assets/stats.svg "https://vercel.app"

      - name: Download top languages card
        run: |
          curl -o assets/top-langs.svg "https://vercel.app"

      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update stats cards"
          file_pattern: 'assets/*.svg'
